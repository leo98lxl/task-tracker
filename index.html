<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task-Tracker</title>
    <script type="module" src="./dist/main.js"></script>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <h1 id="title">Task Tracker</h1>

    <input id="task-input" type="text" placeholder="Enter new task" required/>

    <label for="priority-input">Select priority:</label>
    <select id="priority-input" required>
        <option value="low">Low</option>
        <option value="medium" selected>Medium</option>
        <option value="high">High</option>
    </select>

    <button id="task-button">Add task</button>

    <div id="app">
    </div>
</body>
</html>
